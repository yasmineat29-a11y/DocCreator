<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alternative Word App</title>
    <style>
        body { font-family: Arial, sans-serif; color: black; padding: 20px; }
        
        /* Layout and Text */
        .section { margin-bottom: 30px; padding: 10px; }
        .title-header { color: #00CED1; font-weight: bold; }
        
        /* Table: Borderless cells */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        td, th { padding: 8px; border: none; text-align: inherit; }
        th { background-color: #AFEEEE !important; color: black; }
        
        /* Photo sizing */
        .user-img { max-width: 150px; height: auto; display: block; margin: 5px 0; }
        
        /* Hide controls when printing */
        @media print {
            .no-print { display: none !important; }
            th { -webkit-print-color-adjust: exact; }
        }
    </style>
</head>
<body>

    <div class="no-print" style="margin-bottom: 20px;">
        <label>اتخاد النص: </label>
        <button onclick="setDir('rtl')">RTL (يمين)</button>
        <button onclick="setDir('ltr')">LTR (يسار)</button>
    </div>

    <div id="header-section" class="section">
        <input type="text" placeholder="عنوان الترويسة" style="width: 100%; font-size: 24px; border: none; font-weight: bold; margin-bottom: 5px;">
        <input type="file" class="no-print" accept="image/*" onchange="showImage(event, 'header-img')">
        <div id="header-img"></div>
    </div>

    <div id="content"></div>

    <div class="no-print" style="margin-top: 20px;">
        <button onclick="addSection()">+ إضافة قسم</button>
        <button onclick="window.print()">طباعة</button>
    </div>

    <script>
        function setDir(dir) { document.documentElement.dir = dir; }

        function showImage(event, targetId) {
            const reader = new FileReader();
            reader.onload = function() {
                const img = document.createElement('img');
                img.src = reader.result;
                img.className = 'user-img';
                const target = document.getElementById(targetId);
                target.innerHTML = '';
                target.appendChild(img);
            }
            reader.readAsDataURL(event.target.files[0]);
        }

        function addSection() {
            const rows = prompt("عدد الصفوف:", "2");
            const cols = prompt("عدد الأعمدة:", "2");
            const div = document.createElement('div');
            div.className = 'section';
            
            const sectionId = 'sec-' + Date.now();
            let tableHTML = `<table><thead><tr>`;
            for(let i=0; i<cols; i++) tableHTML += `<th>عنوان</th>`;
            tableHTML += `</tr></thead><tbody>`;
            for(let r=0; r<rows; r++) {
                tableHTML += `<tr>`;
                for(let c=0; c<cols; c++) tableHTML += `<td><input type="text" style="width:90%; border:none;"></td>`;
                tableHTML += `</tr>`;
            }
            tableHTML += `</tbody></table>`;

            div.innerHTML = `
                <div class="title-header" contenteditable="true">عنوان القسم</div>
                <input type="file" class="no-print" accept="image/*" onchange="showImage(event, '${sectionId}-img')">
                <div id="${sectionId}-img"></div>
                ${tableHTML}
            `;
            document.getElementById('content').appendChild(div);
        }
    </script>
</body>
</html>
