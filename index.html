<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Alternative Word App - Pro</title>
    <script src="https://unpkg.com/html-docx-js@0.3.1/dist/html-docx.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/1.3.8/FileSaver.js"></script>
    
    <style>
        body { font-family: Arial, sans-serif; color: black !important; padding: 20px; }
        
        /* ترويسة الصفحة */
        .page-header { display: flex; align-items: center; gap: 20px; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        .page-header img { width: 80px; height: 80px; object-fit: cover; }
        
        .section { margin-bottom: 20px; padding: 10px; border: 1px solid #ddd; position: relative; }
        .delete-btn { color: red; cursor: pointer; position: absolute; top: 5px; left: 5px; font-weight: bold; }
        
        .title-header, .sub-header { text-align: center; font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        td, th { padding: 8px; border: 1px solid black !important; text-align: center; }
        th { background-color: #AFEEEE !important; }
        
        input[type="text"] { width: 90%; border: none; background: transparent; text-align: center; }
        
        @media print {
            .no-print { display: none !important; }
            thead { display: table-header-group; } /* تثبيت رأس الجدول عند الطباعة */
        }
    </style>
</head>
<body>

    <div class="page-header">
        <input type="file" id="logoInput" accept="image/*" onchange="previewLogo(event)">
        <img id="logoPreview" src="" style="display:none;">
        <h1 contenteditable="true">اسم المستند أو الشركة</h1>
    </div>

    <div id="content"></div>

    <div class="no-print" style="margin-top: 20px;">
        <button onclick="addSection()">+ إضافة قسم</button>
        <button onclick="exportToWord()">تحميل كـ Word</button>
    </div>

    <script>
        function previewLogo(event) {
            const reader = new FileReader();
            reader.onload = function() {
                const img = document.getElementById('logoPreview');
                img.src = reader.result;
                img.style.display = 'block';
            }
            reader.readAsDataURL(event.target.files[0]);
        }

        function addSection() {
            const div = document.createElement('div');
            div.className = 'section';
            const sectionId = 'sec-' + Date.now();
            
            div.innerHTML = `
                <span class="delete-btn" onclick="this.parentElement.remove()">[حذف القسم]</span>
                <div class="title-header" contenteditable="true">عنوان القسم</div>
                <div class="sub-header" contenteditable="true">عنوان فرعي</div>
                <div contenteditable="true">الوصف...</div>
                <table id="${sectionId}">
                    <thead><tr><th><input type="text" value="عنصر 1"></th><th><input type="text" value="عنصر 2"></th></tr></thead>
                    <tbody><tr><td><input type="text"></td><td><input type="text"></td></tr></tbody>
                </table>
            `;
            document.getElementById('content').appendChild(div);
        }

        function exportToWord() {
            const content = document.getElementById('content').innerHTML;
            const header = document.querySelector('.page-header').innerHTML;
            const fullHtml = `<html><body>${header}${content}</body></html>`;
            
            const converted = htmlDocx.asBlob(fullHtml);
            saveAs(converted, 'document.docx');
        }
    </script>
</body>
</html>
