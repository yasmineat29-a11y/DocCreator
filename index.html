<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alternative Word App</title>
    <script src="https://unpkg.com/html-docx-js@0.3.1/dist/html-docx.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/1.3.8/FileSaver.js"></script>
    
    <style>
        body { font-family: Arial, sans-serif; padding: 10px; margin: 0; }
        
        /* الترويسة الثابتة للطباعة */
        .main-container { width: 100%; border-collapse: collapse; }
        .header-row { display: table-header-group; }
        
        .header-content { display: flex; align-items: center; gap: 10px; padding: 10px; border-bottom: 2px solid #ccc; }
        .header-content img { width: 50px; height: 50px; object-fit: cover; }
        
        /* الاقسام */
        .section { margin-bottom: 20px; padding: 10px; border: 1px solid #ddd; position: relative; }
        .delete-btn { color: red; cursor: pointer; position: absolute; top: 5px; left: 5px; font-weight: bold; }
        
        /* الجداول */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; table-layout: fixed; }
        td, th { padding: 8px; border: 1px solid black !important; text-align: center; overflow-wrap: break-word; }
        th { background-color: #AFEEEE !important; display: table-header-group; } /* تثبيت رأس الجدول */
        
        .cell-edit { min-height: 20px; outline: none; white-space: pre-wrap; }

        @media print {
            .no-print { display: none !important; }
        }
    </style>
</head>
<body>

    <table class="main-container">
        <thead class="header-row">
            <tr>
                <td>
                    <div class="header-content">
                        <input type="file" class="no-print" accept="image/*" onchange="showImage(event, 'header-img')">
                        <div id="header-img"></div>
                        <h2 contenteditable="true" style="font-size: 16px; margin: 0;">عنوان المستند الرئيسي</h2>
                    </div>
                </td>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>
                    <div id="content"></div>
                </td>
            </tr>
        </tbody>
    </table>

    <div class="no-print" style="margin-top: 20px; border-top: 1px solid #ccc; padding-top: 10px;">
        <button onclick="setDir('rtl')">RTL</button>
        <button onclick="setDir('ltr')">LTR</button>
        <button onclick="addSection()">+ إضافة قسم</button>
        <button onclick="exportToWord()">تحميل كـ Word</button>
        <button onclick="window.print()">طباعة</button>
    </div>

    <script>
        function setDir(dir) { document.documentElement.dir = dir; }

        function showImage(event, targetId) {
            const reader = new FileReader();
            reader.onload = function() {
                const img = document.createElement('img');
                img.src = reader.result;
                const target = document.getElementById(targetId);
                target.innerHTML = '';
                target.appendChild(img);
            }
            reader.readAsDataURL(event.target.files[0]);
        }

        function addSection() {
            const rows = prompt("عدد الصفوف:", "2");
            const cols = prompt("عدد الأعمدة:", "2");
            const div = document.createElement('div');
            div.className = 'section';
            
            let tableHTML = `<table><thead><tr>`;
            for(let i=0; i<cols; i++) tableHTML += `<th><div class="cell-edit" contenteditable="true">عنوان</div></th>`;
            tableHTML += `</tr></thead><tbody>`;
            for(let r=0; r<rows; r++) {
                tableHTML += `<tr>`;
                for(let c=0; c<cols; c++) tableHTML += `<td><div class="cell-edit" contenteditable="true"></div></td>`;
                tableHTML += `</tr>`;
            }
            tableHTML += `</tbody></table>`;

            div.innerHTML = `
                <span class="delete-btn no-print" onclick="this.parentElement.remove()">[حذف]</span>
                <div style="text-align:center; font-weight:bold;" contenteditable="true">عنوان القسم</div>
                <div style="text-align:center; font-weight:bold;" contenteditable="true">عنوان فرعي</div>
                <div contenteditable="true">الوصف...</div>
                ${tableHTML}
            `;
            document.getElementById('content').appendChild(div);
        }

        function exportToWord() {
            const content = document.querySelector('.main-container').outerHTML;
            const fullHtml = `<html dir="${document.documentElement.dir}"><body>${content}</body></html>`;
            const converted = htmlDocx.asBlob(fullHtml);
            saveAs(converted, 'document.docx');
        }
    </script>
</body>
</html>
