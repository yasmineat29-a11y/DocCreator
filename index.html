<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alternative Word App</title>
    <script src="https://unpkg.com/html-docx-js@0.3.1/dist/html-docx.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/1.3.8/FileSaver.js"></script>
    
    <style>
        body { font-family: Arial, sans-serif; padding: 10px; margin: 0; }
        
        /* الترويسة */
        .print-header { display: none; }
        .page-header { display: flex; align-items: center; gap: 15px; padding: 10px; border-bottom: 2px solid #333; margin-bottom: 20px; }
        .page-header img { width: 50px; height: 50px; object-fit: cover; }
        
        /* الأقسام */
        .section { margin-bottom: 25px; padding: 10px; border: 1px solid #ccc; position: relative; }
        .delete-btn { color: red; cursor: pointer; position: absolute; top: 5px; left: 5px; font-weight: bold; font-size: 14px; }
        .title-header, .sub-header { text-align: center; font-weight: bold; margin: 5px 0; }
        
        /* الجداول */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; table-layout: fixed; }
        td, th { padding: 8px; border: 1px solid black !important; text-align: center; word-wrap: break-word; }
        th { background-color: #AFEEEE !important; }
        .cell-edit { min-height: 20px; outline: none; white-space: pre-wrap; }

        @media print {
            .no-print { display: none !important; }
            .print-header { display: table-header-group; }
            thead { display: table-header-group; }
        }
    </style>
</head>
<body>

    <table style="width:100%; border:none;">
        <thead class="print-header">
            <tr><td><div class="page-header"><div id="print-img"></div><h2 contenteditable="true">عنوان المستند الرئيسي</h2></div></td></tr>
        </thead>
    </table>

    <div class="page-header no-print">
        <input type="file" accept="image/*" onchange="showImage(event, 'print-img', 'screen-img')">
        <div id="screen-img"></div>
        <h2 contenteditable="true" style="margin: 0;">عنوان المستند الرئيسي</h2>
    </div>

    <div id="content"></div>

    <div class="no-print" style="margin-top: 20px; padding: 10px; border-top: 2px solid #eee;">
        <button onclick="setDir('rtl')">RTL</button>
        <button onclick="setDir('ltr')">LTR</button>
        <button onclick="addSection()">+ إضافة قسم</button>
        <button onclick="exportToWord()">تحميل Word</button>
        <button onclick="window.print()">طباعة</button>
    </div>

    <script>
        function setDir(dir) { document.documentElement.dir = dir; }

        function showImage(event, id1, id2) {
            const reader = new FileReader();
            reader.onload = function() {
                const img = document.createElement('img');
                img.src = reader.result;
                img.style.width = '50px';
                document.getElementById(id1).innerHTML = '';
                document.getElementById(id2).innerHTML = '';
                document.getElementById(id1).appendChild(img.cloneNode(true));
                document.getElementById(id2).appendChild(img);
            }
            reader.readAsDataURL(event.target.files[0]);
        }

        function addSection() {
            const rows = prompt("عدد الصفوف:", "2");
            const cols = prompt("عدد الأعمدة:", "2");
            const div = document.createElement('div');
            div.className = 'section';
            
            let tableHTML = `<table><thead><tr>`;
            for(let i=0; i<cols; i++) tableHTML += `<th><div class="cell-edit" contenteditable="true">عنوان</div></th>`;
            tableHTML += `</tr></thead><tbody>`;
            for(let r=0; r<rows; r++) {
                tableHTML += `<tr>`;
                for(let c=0; c<cols; c++) tableHTML += `<td><div class="cell-edit" contenteditable="true"></div></td>`;
                tableHTML += `</tr>`;
            }
            tableHTML += `</tbody></table>`;

            div.innerHTML = `
                <span class="delete-btn" onclick="this.parentElement.remove()">[حذف]</span>
                <div class="title-header" contenteditable="true">عنوان القسم</div>
                <div class="sub-header" contenteditable="true">عنوان فرعي</div>
                <div contenteditable="true">الوصف...</div>
                ${tableHTML}
            `;
            document.getElementById('content').appendChild(div);
        }

        function exportToWord() {
            const content = document.getElementById('content').innerHTML;
            const fullHtml = `<html><body dir="${document.documentElement.dir}">${content}</body></html>`;
            const converted = htmlDocx.asBlob(fullHtml);
            saveAs(converted, 'document.docx');
        }
    </script>
</body>
</html>
