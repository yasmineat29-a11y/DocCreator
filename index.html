<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Alternative Word App</title>
    <script src="https://unpkg.com/html-docx-js@0.3.1/dist/html-docx.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/1.3.8/FileSaver.js"></script>
    
    <style>
        body { font-family: Arial, sans-serif; padding: 10px; margin: 0; }
        
        /* الترويسة الثابتة في كل صفحة */
        .print-header { display: none; }
        
        .main-header { display: flex; align-items: center; gap: 15px; border-bottom: 2px solid #ccc; padding-bottom: 10px; margin-bottom: 20px; }
        .main-header img { width: 60px; height: 60px; object-fit: cover; }
        
        .section { margin-bottom: 20px; padding: 10px; border: 1px solid #ddd; position: relative; }
        .delete-btn { color: red; cursor: pointer; position: absolute; top: 5px; left: 5px; font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 5px; }
        td, th { padding: 8px; border: 1px solid black !important; text-align: center; }
        th { background-color: #AFEEEE !important; }
        
        /* الخلايا تدعم الأسطر الجديدة */
        .cell-edit { min-height: 20px; outline: none; white-space: pre-wrap; word-wrap: break-word; }

        @media print {
            .no-print { display: none !important; }
            .print-header { display: table-header-group; } /* تثبيت الترويسة */
            thead { display: table-header-group; }         /* تثبيت رأس الجدول */
        }
    </style>
</head>
<body>

    <table style="width:100%; border:none;">
        <thead class="print-header">
            <tr>
                <td>
                    <div class="main-header">
                        <div id="header-img"></div>
                        <h2 contenteditable="true" style="font-size: 16px; font-weight: normal; margin: 0;">عنوان المستند الرئيسي</h2>
                    </div>
                </td>
            </tr>
        </thead>
    </table>

    <div id="header-area" class="main-header no-print">
        <input type="file" accept="image/*" onchange="showImage(event, 'header-img')">
        <div id="header-img"></div>
        <h2 contenteditable="true" style="font-size: 16px; font-weight: normal; margin: 0;">عنوان المستند الرئيسي</h2>
    </div>

    <div id="content"></div>

    <div class="no-print" style="margin-top: 20px;">
        <button onclick="setDir('rtl')">RTL (يمين)</button>
        <button onclick="setDir('ltr')">LTR (يسار)</button>
        <button onclick="addSection()">+ إضافة قسم</button>
        <button onclick="exportToWord()">تحميل كـ Word</button>
        <button onclick="window.print()">طباعة</button>
    </div>

    <script>
        function setDir(dir) { document.documentElement.dir = dir; }

        function showImage(event, targetId) {
            const reader = new FileReader();
            reader.onload = function() {
                const img = document.createElement('img');
                img.src = reader.result;
                img.style.width = '60px';
                document.querySelectorAll('#' + targetId).forEach(el => {
                    el.innerHTML = '';
                    el.appendChild(img.cloneNode(true));
                });
            }
            reader.readAsDataURL(event.target.files[0]);
        }

        function addSection() {
            const rows = prompt("عدد الصفوف:", "2");
            const cols = prompt("عدد الأعمدة:", "2");
            const div = document.createElement('div');
            div.className = 'section';
            
            let tableHTML = `<table><thead><tr>`;
            for(let i=0; i<cols; i++) tableHTML += `<th><div class="cell-edit" contenteditable="true">عنوان</div></th>`;
            tableHTML += `</tr></thead><tbody>`;
            for(let r=0; r<rows; r++) {
                tableHTML += `<tr>`;
                for(let c=0; c<cols; c++) tableHTML += `<td><div class="cell-edit" contenteditable="true"></div></td>`;
                tableHTML += `</tr>`;
            }
            tableHTML += `</tbody></table>`;

            div.innerHTML = `
                <span class="delete-btn no-print" onclick="this.parentElement.remove()">[حذف]</span>
                <div style="text-align:center; font-weight:bold;" contenteditable="true">عنوان القسم</div>
                <div style="text-align:center; font-weight:bold;" contenteditable="true">عنوان فرعي</div>
                <div contenteditable="true">الوصف...</div>
                ${tableHTML}
            `;
            document.getElementById('content').appendChild(div);
        }

        function exportToWord() {
            const fullHtml = `
                <html dir="${document.documentElement.dir}">
                <head><style>body{font-family:Arial;} table{width:100%; border-collapse:collapse;} td,th{border:1px solid black; padding:5px; text-align:center;} th{background:#AFEEEE;}</style></head>
                <body>${document.getElementById('content').innerHTML}</body>
                </html>`;
            const converted = htmlDocx.asBlob(fullHtml);
            saveAs(converted, 'document.docx');
        }
    </script>
</body>
</html>
