<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alternative Word App</title>
    <script src="https://unpkg.com/html-docx-js@0.3.1/dist/html-docx.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/1.3.8/FileSaver.js"></script>
    
    <style>
        body { font-family: Arial, sans-serif; color: black !important; padding: 10px; margin: 0; }
        
        /* ترويسة الصفحة */
        .main-header { display: flex; align-items: center; gap: 15px; border-bottom: 2px solid #ccc; padding: 10px; margin-bottom: 10px; }
        .main-header img { width: 100px; height: 100px; object-fit: cover; }
        
        /* Sections */
        .section { margin-bottom: 20px; padding: 10px; border: 1px solid #ddd; position: relative; }
        .delete-btn { color: red; cursor: pointer; position: absolute; top: 5px; left: 5px; font-weight: bold; font-size: 12px; }
        
        /* Titles - Middle Aligned */
        .title-header, .sub-header { text-align: center; font-weight: bold; color: black !important; }
        .title-header { font-size: 18px; }
        .sub-header { font-size: 16px; }
        .description-box { margin-bottom: 5px; font-size: 14px; color: black !important; }
        
        /* Table */
        table { width: 100%; border-collapse: collapse; margin-top: 5px; }
        td, th { padding: 4px; border: 1px solid black !important; color: black !important; text-align: center; }
        th { background-color: #AFEEEE !important; }
        input[type="text"] { width: 100%; border: none; background: transparent; color: black; font-family: Arial; text-align: center; }
        
        .user-img { max-width: 150px; height: auto; display: block; margin: 2px 0; }
        
        @media print {
            .no-print { display: none !important; }
            th { -webkit-print-color-adjust: exact; }
            thead { display: table-header-group; } /* تثبيت رأس الجدول عند الطباعة */
        }
    </style>
</head>
<body>

    <div class="no-print" style="margin-bottom: 10px; padding: 5px; border: 1px solid #ccc; display: inline-block;">
        <button onclick="setDir('rtl')">RTL (يمين)</button>
        <button onclick="setDir('ltr')">LTR (يسار)</button>
    </div>

    <div class="main-header">
        <input type="file" class="no-print" accept="image/*" onchange="showImage(event, 'header-img')">
        <div id="header-img"></div>
        <h2 contenteditable="true" style="flex-grow: 1; text-align: center;">عنوان المستند الرئيسي</h2>
    </div>

    <div id="content"></div>

    <div class="no-print" style="margin-top: 10px;">
        <button onclick="addSection()">+ إضافة قسم</button>
        <button onclick="exportToWord()">تحميل كـ Word</button>
        <button onclick="window.print()">طباعة</button>
    </div>

    <script>
        function setDir(dir) { document.documentElement.dir = dir; }

        function showImage(event, targetId) {
            const reader = new FileReader();
            reader.onload = function() {
                const img = document.createElement('img');
                img.src = reader.result;
                img.className = 'user-img';
                const target = document.getElementById(targetId);
                target.innerHTML = '';
                target.appendChild(img);
            }
            reader.readAsDataURL(event.target.files[0]);
        }

        function addSection() {
            const rows = prompt("عدد الصفوف:", "2");
            const cols = prompt("عدد الأعمدة:", "2");
            const div = document.createElement('div');
            div.className = 'section';
            const sectionId = 'sec-' + Date.now();
            
            let tableHTML = `<table><thead><tr>`;
            for(let i=0; i<cols; i++) tableHTML += `<th><input type="text" value="عنوان"></th>`;
            tableHTML += `</tr></thead><tbody>`;
            for(let r=0; r<rows; r++) {
                tableHTML += `<tr>`;
                for(let c=0; c<cols; c++) tableHTML += `<td><input type="text"></td>`;
                tableHTML += `</tr>`;
            }
            tableHTML += `</tbody></table>`;

            div.innerHTML = `
                <span class="delete-btn" onclick="this.parentElement.remove()">[حذف القسم]</span>
                <div class="title-header" contenteditable="true">عنوان القسم</div>
                <div class="sub-header" contenteditable="true">عنوان فرعي</div>
                <div class="description-box" contenteditable="true">الوصف...</div>
                <input type="file" class="no-print" accept="image/*" onchange="showImage(event, '${sectionId}-img')">
                <div id="${sectionId}-img"></div>
                ${tableHTML}
            `;
            document.getElementById('content').appendChild(div);
        }

        function exportToWord() {
            const header = document.querySelector('.main-header').innerHTML;
            const content = document.getElementById('content').innerHTML;
            const fullHtml = `<html><body dir="${document.documentElement.dir}">${header}${content}</body></html>`;
            const converted = htmlDocx.asBlob(fullHtml);
            saveAs(converted, 'document.docx');
        }
    </script>
</body>
</html>
