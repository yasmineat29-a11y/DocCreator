<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Alternative Word App</title>
    <script src="https://unpkg.com/html-docx-js@0.3.1/dist/html-docx.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/1.3.8/FileSaver.js"></script>
    
    <style>
        body { font-family: Arial, sans-serif; padding: 10px; }
        
        /* تنسيق الطباعة لضمان ثبات الترويسة */
        @media print {
            .no-print { display: none !important; }
            table { page-break-inside: auto; }
            tr { page-break-inside: avoid; page-break-after: auto; }
            thead { display: table-header-group; } /* تكرار الترويسة */
        }

        .page-header { display: flex; align-items: center; gap: 15px; padding: 10px; border-bottom: 2px solid #ccc; margin-bottom: 20px; }
        .page-header img { width: 50px; height: 50px; object-fit: cover; }
        .section { margin-bottom: 20px; padding: 10px; border: 1px solid #ddd; position: relative; }
        .delete-btn { color: red; cursor: pointer; position: absolute; top: 5px; left: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        td, th { padding: 8px; border: 1px solid black !important; text-align: center; }
        th { background-color: #AFEEEE !important; }
        .cell-edit { min-height: 20px; outline: none; word-break: break-word; }
    </style>
</head>
<body>

    <div class="page-header" id="main-header">
        <div id="header-img"></div>
        <input type="file" class="no-print" accept="image/*" onchange="showImage(event, 'header-img')">
        <h2 contenteditable="true" style="margin: 0;">عنوان المستند الرئيسي</h2>
    </div>

    <div id="content"></div>

    <div class="no-print" style="margin-top: 20px; position: sticky; bottom: 0; background: #fff; padding: 10px;">
        <button onclick="setDir('rtl')">RTL</button>
        <button onclick="setDir('ltr')">LTR</button>
        <button onclick="addSection()">+ إضافة قسم</button>
        <button onclick="exportToWord()">تحميل Word</button>
        <button onclick="window.print()">طباعة</button>
    </div>

    <script>
        function setDir(dir) { document.documentElement.dir = dir; }

        function showImage(event, targetId) {
            const reader = new FileReader();
            reader.onload = function() {
                const img = document.createElement('img');
                img.src = reader.result;
                const container = document.getElementById(targetId);
                container.innerHTML = '';
                container.appendChild(img);
            }
            reader.readAsDataURL(event.target.files[0]);
        }

        function addSection() {
            const rows = prompt("عدد الصفوف:", "2");
            const cols = prompt("عدد الأعمدة:", "2");
            if(!rows || !cols) return;
            
            const div = document.createElement('div');
            div.className = 'section';
            
            let tableHTML = `<table><thead><tr>`;
            for(let i=0; i<cols; i++) tableHTML += `<th><div class="cell-edit" contenteditable="true">عنوان</div></th>`;
            tableHTML += `</tr></thead><tbody>`;
            for(let r=0; r<rows; r++) {
                tableHTML += `<tr>`;
                for(let c=0; c<cols; c++) tableHTML += `<td><div class="cell-edit" contenteditable="true"></div></td>`;
                tableHTML += `</tr>`;
            }
            tableHTML += `</tbody></table>`;

            div.innerHTML = `
                <span class="delete-btn no-print" onclick="this.parentElement.remove()">[حذف]</span>
                <div contenteditable="true"><b>عنوان القسم</b></div>
                ${tableHTML}
            `;
            document.getElementById('content').appendChild(div);
        }

        function exportToWord() {
            const header = document.getElementById('main-header').outerHTML;
            const content = document.getElementById('content').innerHTML;
            // إزالة الأزرار من التصدير
            const cleanContent = content.replace(/<span class="delete-btn no-print".*?<\/span>/g, "");
            const fullHtml = `<html><body dir="${document.documentElement.dir}">${header}${cleanContent}</body></html>`;
            
            const converted = htmlDocx.asBlob(fullHtml);
            saveAs(converted, 'document.docx');
        }
    </script>
</body>
</html>
