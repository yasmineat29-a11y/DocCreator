<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alternative Word App</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; color: black; }
        .section { margin-bottom: 30px; border: 1px solid #ccc; padding: 20px; }
        
        /* Turquoise Styles */
        .title-header, .sub-header { color: #00CED1; }
        th { background-color: #AFEEEE !important; color: black; }
        
        /* Ensure styles print */
        @media print {
            button, .no-print { display: none; }
            th { -webkit-print-color-adjust: exact; }
        }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        td, th { border: 1px solid black; padding: 8px; }
        img { max-width: 100%; height: auto; display: block; margin: 10px 0; }
    </style>
</head>
<body>

    <!-- Header Section -->
    <div id="header-section" class="section">
        <input type="text" placeholder="عنوان الترويسة الرئيسي" style="width: 100%; font-size: 24px; font-weight: bold; margin-bottom: 10px;">
        <input type="file" accept="image/*" onchange="showImage(event, 'header-img')">
        <div id="header-img"></div>
    </div>

    <div id="content"></div>

    <div class="no-print">
        <button onclick="addSection()">إضافة قسم</button>
        <button onclick="window.print()">طباعة المستند</button>
    </div>

    <script>
        function showImage(event, targetId) {
            const reader = new FileReader();
            reader.onload = function() {
                document.getElementById(targetId).innerHTML = `<img src="${reader.result}">`;
            }
            reader.readAsDataURL(event.target.files[0]);
        }

        function addSection() {
            const rows = prompt("عدد الصفوف:", "2");
            const cols = prompt("عدد الأعمدة:", "2");
            
            const div = document.createElement('div');
            div.className = 'section';
            
            let tableHTML = `<table><thead><tr>`;
            for(let i=0; i<cols; i++) tableHTML += `<th>عنوان</th>`;
            tableHTML += `</tr></thead><tbody>`;
            for(let r=0; r<rows; r++) {
                tableHTML += `<tr>`;
                for(let c=0; c<cols; c++) tableHTML += `<td><input type="text" style="width:90%"></td>`;
                tableHTML += `</tr>`;
            }
            tableHTML += `</tbody></table>`;

            div.innerHTML = `
                <h2 class="title-header" contenteditable="true">عنوان القسم</h2>
                <input type="file" accept="image/*" onchange="showImage(event, 'img-${Date.now()}')">
                <div id="img-${Date.now()}"></div>
                ${tableHTML}
            `;
            document.getElementById('content').appendChild(div);
        }
    </script>
</body>
</html>
