<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alternative Word App</title>
    <script src="https://unpkg.com/html-docx-js@0.3.1/dist/html-docx.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/1.3.8/FileSaver.js"></script>
    
    <style>
        body { font-family: Arial, sans-serif; padding: 10px; margin: 0; }
        
        /* الترويسة */
        .page-header { display: flex; align-items: center; gap: 15px; border-bottom: 2px solid #ccc; padding-bottom: 10px; margin-bottom: 20px; }
        .page-header img { width: 60px; height: 60px; object-fit: cover; }
        .page-header h2 { font-size: 16px; font-weight: normal; margin: 0; }
        
        .section { margin-bottom: 20px; padding: 10px; border: 1px solid #ddd; position: relative; }
        .delete-btn { color: red; cursor: pointer; position: absolute; top: 5px; left: 5px; font-weight: bold; }
        
        .title-header, .sub-header { text-align: center; font-weight: bold; margin-bottom: 2px; }
        
        /* الجداول - الخلايا تناسب المحتوى */
        table { width: 100%; border-collapse: collapse; margin-top: 5px; table-layout: auto; }
        td, th { padding: 4px 8px; border: 1px solid black !important; text-align: center; white-space: nowrap; }
        th { background-color: #AFEEEE !important; }
        input[type="text"] { width: 100%; border: none; background: transparent; text-align: center; min-width: 50px; }
        
        @media print {
            .no-print { display: none !important; }
            /* جعل الترويسة تكرر في كل صفحة عبر الطباعة */
            thead { display: table-header-group; }
            .header-container { display: table-header-group; }
        }
    </style>
</head>
<body>

    <div class="page-header" id="header-area">
        <input type="file" class="no-print" accept="image/*" onchange="showImage(event, 'header-img')">
        <div id="header-img"></div>
        <h2 contenteditable="true" style="flex-grow: 1;">عنوان المستند الرئيسي</h2>
    </div>

    <div id="content"></div>

    <div class="no-print" style="margin-top: 20px;">
        <button onclick="setDir('rtl')">RTL</button>
        <button onclick="setDir('ltr')">LTR</button>
        <button onclick="addSection()">+ إضافة قسم</button>
        <button onclick="exportToWord()">تحميل كـ Word</button>
        <button onclick="window.print()">طباعة</button>
    </div>

    <script>
        function setDir(dir) { document.documentElement.dir = dir; }

        function showImage(event, targetId) {
            const reader = new FileReader();
            reader.onload = function() {
                const img = document.createElement('img');
                img.src = reader.result;
                img.style.width = '60px';
                const target = document.getElementById(targetId);
                target.innerHTML = '';
                target.appendChild(img);
            }
            reader.readAsDataURL(event.target.files[0]);
        }

        function addSection() {
            const rows = prompt("عدد الصفوف:", "2");
            const cols = prompt("عدد الأعمدة:", "2");
            const div = document.createElement('div');
            div.className = 'section';
            
            let tableHTML = `<table><thead><tr>`;
            for(let i=0; i<cols; i++) tableHTML += `<th><input type="text" value="عنوان"></th>`;
            tableHTML += `</tr></thead><tbody>`;
            for(let r=0; r<rows; r++) {
                tableHTML += `<tr>`;
                for(let c=0; c<cols; c++) tableHTML += `<td><input type="text"></td>`;
                tableHTML += `</tr>`;
            }
            tableHTML += `</tbody></table>`;

            div.innerHTML = `
                <span class="delete-btn no-print" onclick="this.parentElement.remove()">[حذف]</span>
                <div class="title-header" contenteditable="true">عنوان القسم</div>
                <div class="sub-header" contenteditable="true">عنوان فرعي</div>
                <div contenteditable="true">الوصف...</div>
                ${tableHTML}
            `;
            document.getElementById('content').appendChild(div);
        }

        function exportToWord() {
            document.querySelectorAll('input[type="text"]').forEach(input => {
                input.setAttribute('value', input.value);
            });

            const fullHtml = `
                <html dir="${document.documentElement.dir}">
                <head><style>body{font-family:Arial;} table{width:100%; border-collapse:collapse;} td,th{border:1px solid black; padding:5px; text-align:center;} th{background:#AFEEEE;}</style></head>
                <body>${document.getElementById('header-area').outerHTML}${document.getElementById('content').innerHTML}</body>
                </html>`;
            
            const converted = htmlDocx.asBlob(fullHtml);
            saveAs(converted, 'document.docx');
        }
    </script>
</body>
</html>
