<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alternative Word App</title>
    <style>
        body { font-family: Arial, sans-serif; color: black !important; padding: 10px; margin: 0; }
        
        /* Compact sections */
        .section { margin-bottom: 10px; padding: 5px; border-bottom: none; }
        
        /* Titles and Text */
        .title-header { font-weight: bold; font-size: 18px; color: black !important; margin-bottom: 2px; }
        .sub-header { font-weight: bold; font-size: 16px; color: black !important; margin-bottom: 2px; }
        .description-box { margin-bottom: 5px; font-size: 14px; color: black !important; }
        
        /* Table: Compact and fully editable */
        table { width: 100%; border-collapse: collapse; margin-top: 5px; }
        td, th { padding: 4px; border: 1px solid black !important; color: black !important; }
        th { background-color: #AFEEEE !important; text-align: center; }
        input[type="text"] { width: 100%; border: none; background: transparent; color: black; font-family: Arial; }
        
        .user-img { max-width: 150px; height: auto; display: block; margin: 2px 0; }
        
        @media print {
            .no-print { display: none !important; }
            th { -webkit-print-color-adjust: exact; }
            .section { margin-bottom: 5px; }
        }
    </style>
</head>
<body>

    <div class="no-print" style="margin-bottom: 10px; padding: 5px; border: 1px solid #ccc; display: inline-block;">
        <button onclick="setDir('rtl')">RTL (يمين)</button>
        <button onclick="setDir('ltr')">LTR (يسار)</button>
    </div>

    <div id="content"></div>

    <div class="no-print" style="margin-top: 10px;">
        <button onclick="addSection()">+ إضافة قسم</button>
        <button onclick="window.print()">طباعة</button>
    </div>

    <script>
        function setDir(dir) { document.documentElement.dir = dir; }

        function showImage(event, targetId) {
            const reader = new FileReader();
            reader.onload = function() {
                const img = document.createElement('img');
                img.src = reader.result;
                img.className = 'user-img';
                const target = document.getElementById(targetId);
                target.innerHTML = '';
                target.appendChild(img);
            }
            reader.readAsDataURL(event.target.files[0]);
        }

        function addSection() {
            const rows = prompt("عدد الصفوف:", "2");
            const cols = prompt("عدد الأعمدة:", "2");
            const div = document.createElement('div');
            div.className = 'section';
            
            const sectionId = 'sec-' + Date.now();
            
            // Build Table with Editable Header Cells
            let tableHTML = `<table><thead><tr>`;
            for(let i=0; i<cols; i++) tableHTML += `<th><input type="text" value="عنوان"></th>`;
            tableHTML += `</tr></thead><tbody>`;
            for(let r=0; r<rows; r++) {
                tableHTML += `<tr>`;
                for(let c=0; c<cols; c++) tableHTML += `<td><input type="text"></td>`;
                tableHTML += `</tr>`;
            }
            tableHTML += `</tbody></table>`;

            div.innerHTML = `
                <div class="title-header" contenteditable="true">عنوان القسم</div>
                <div class="sub-header" contenteditable="true">عنوان فرعي</div>
                <div class="description-box" contenteditable="true">الوصف...</div>
                <input type="file" class="no-print" accept="image/*" onchange="showImage(event, '${sectionId}-img')">
                <div id="${sectionId}-img"></div>
                ${tableHTML}
            `;
            document.getElementById('content').appendChild(div);
        }
    </script>
</body>
</html>
